<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Agitech AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #ececec;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 80px;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-logo {
      height: 72px;
      display: flex;
      align-items: center;
    }
    .topbar-logo img {
      height: 100%;
      width: auto;
      object-fit: contain;
      display: block;
    }
    .topbar-title {
      font-size: 28px;
      font-weight: 600;
      color: #ececec;
      line-height: 1.05;
      margin-top: 8px; /* More space above "Gigi" */
    }
    .topbar-tags {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
      align-items: flex-start;
    }
    .tag {
      font-size: 11px;
      color: #aaa;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      padding: 2px 10px;
      line-height: 1.2;
      white-space: nowrap;
    }
    .tag-mauve {
      background: #3a2a5f;
      border-color: #6f4ccf;
      color: #e9ddff;
    }
    .topbar-badge {
      font-size: 11px;
      color: #888;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* Progress bar slim at very top */
    .progress-bar {
      height: 2px;
      background: #2a2a2a;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: #7C6EE6;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .msg-row {
      display: flex;
      padding: 0.6rem 1.5rem;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }
    .msg-avatar.bot-av {
      background: #7C6EE6;
      color: #fff;
    }
    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Avoid cropping; keep the full face visible */
      object-position: center;
      display: block;
      border-radius: 50%;
    }
    .msg-avatar.user-av {
      background: #2e2e2e;
      color: #aaa;
      border: 1px solid #3a3a3a;
    }

    .msg-bubble {
      max-width: 72%;
      font-size: 17px;
      line-height: 1.72;
      color: #ececec;
      padding: 0;
    }
    .msg-row.user .msg-bubble {
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 16px;
      color: #ececec;
    }
    .msg-row.bot .msg-bubble {
      color: #ececec;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 8px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 1rem 1.5rem 1.5rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 0;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: #555; }
    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #ececec;
      font-family: inherit;
      line-height: 1.5;
      padding: 2px 0;
    }
    .input-box input::placeholder { color: #555; }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: #7C6EE6;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    .send-btn:hover { background: #6558d4; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <img src="/Asset/Bot%20pp.png" alt="Agitech bot avatar">
    </div>
    <div>
      <div class="topbar-title">Gigi</div>
        <div class="topbar-tags">
            <span class="tag tag-mauve">Agitech AI Agent</span>
        </div>
    </div>
  </div>
</div>

<div class="chat-messages" id="messages"></div>

<div class="input-area">
  <div class="input-box">
    <input id="input" type="text" placeholder="Votre réponse..." autocomplete="off" />
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
  </div>
  <div class="input-hint">Propulsé par Claude · Vos données restent confidentielles</div>
</div>

<script>
  const STEPS = [
    'intro',
    'website',
    'confirm_website',
    'workflow',
    'confirm_workflow',
    'client_problem',
    'scope',
    'resume',
    'email',
    'done'
  ];
  const PROGRESS = {
    intro: 5,
    website: 20,
    confirm_website: 30,
    workflow: 45,
    confirm_workflow: 55,
    client_problem: 70,
    scope: 80,
    resume: 90,
    email: 97,
    done: 100
  };
  let step = 0;
  let history = [];
  let leadData = {};
  let busy = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const progressEl = document.getElementById('progress');

  const ODOO_MODULES = [
    'CRM & ventes', 'Achats & approvisionnements', 'Stocks & entrepôts',
    'Fabrication', 'Comptabilité & facturation', 'Gestion de projet',
    'RH & paie', 'Commerce en ligne', 'Point de vente', 'Service terrain'
  ];

  const BOT_AVATAR = '/Asset/Bot%20pp.png';

  const INTRO_MESSAGES = [
    "Bonjour ! Je suis Gigi, l'agent IA d'Agitech. 👋",
    "En quelques minutes, je vais cerner votre business, vos processus et vos besoins. Ensuite, je produis un rapport et vous connecte directement à la bonne personne chez Agitech. Pas de formulaire, juste une conversation. 😊",
    "Pour commencer : quel est le site web de votre entreprise ?"
  ];

  function setProgress(stepName) {
    progressEl.style.width = (PROGRESS[stepName] || 0) + '%';
  }

  function renderWorkflow(line) {
    const parts = line.split(/→|->/).map(s => s.trim()).filter(Boolean);
    if (parts.length < 2) return null;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:10px 0;';
    parts.forEach((s, i) => {
      const box = document.createElement('div');
      box.style.cssText = 'background:#2a2a3a;border:1px solid #4a4a7a;border-radius:8px;padding:6px 12px;font-size:13px;color:#c0b8ff;white-space:nowrap;';
      box.textContent = s;
      wrapper.appendChild(box);
      if (i < parts.length - 1) {
        const arrow = document.createElement('span');
        arrow.style.cssText = 'color:#7C6EE6;font-size:16px;flex-shrink:0;';
        arrow.textContent = '→';
        wrapper.appendChild(arrow);
      }
    });
    return wrapper;
  }

  function renderConfirmButtons(onYes, onNo) {
    const container = document.createElement('div');
    container.style.cssText = 'display:flex;gap:8px;margin-top:12px;';

    const yesBtn = document.createElement('button');
    yesBtn.textContent = '✓ Oui, c\'est correct';
    yesBtn.style.cssText = 'background:#7C6EE6;border:none;border-radius:20px;padding:8px 18px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;transition:background 0.2s;';
    yesBtn.addEventListener('mouseenter', () => yesBtn.style.background = '#6558d4');
    yesBtn.addEventListener('mouseleave', () => yesBtn.style.background = '#7C6EE6');
    yesBtn.addEventListener('click', () => {
      container.style.opacity = '0.4';
      container.style.pointerEvents = 'none';
      addMsg('Oui, c\'est correct', 'user');
      onYes();
    });

    const noBtn = document.createElement('button');
    noBtn.textContent = '✎ Non, je veux corriger';
    noBtn.style.cssText = 'background:#2a2a3a;border:1px solid #3a3a5a;border-radius:20px;padding:8px 18px;font-size:13px;color:#aaa;cursor:pointer;font-family:inherit;transition:all 0.2s;';
    noBtn.addEventListener('mouseenter', () => { noBtn.style.background = '#3a3a4a'; noBtn.style.color = '#ececec'; });
    noBtn.addEventListener('mouseleave', () => { noBtn.style.background = '#2a2a3a'; noBtn.style.color = '#aaa'; });
    noBtn.addEventListener('click', () => {
      container.style.opacity = '0.4';
      container.style.pointerEvents = 'none';
      inputEl.disabled = false;
      inputEl.placeholder = 'Écrivez votre correction...';
      inputEl.focus();
      sendBtn.disabled = false;
    });

    container.appendChild(yesBtn);
    container.appendChild(noBtn);
    return container;
  }

  function renderModulePicker(workflowSteps) {
    const container = document.createElement('div');
    container.style.cssText = 'margin-top:12px;';

    const label = document.createElement('p');
    label.style.cssText = 'font-size:13px;color:#888;margin-bottom:10px;';
    label.textContent = 'Sélectionnez ce qui vous correspond — puis cliquez sur Confirmer';
    container.appendChild(label);

    const grid = document.createElement('div');
    grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;';

    const options = workflowSteps.length > 0 ? workflowSteps : ODOO_MODULES;
    const selected = new Set();

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.textContent = opt;
      btn.style.cssText = 'background:#2a2a3a;border:1px solid #3a3a5a;border-radius:20px;padding:7px 14px;font-size:13px;color:#aaa;cursor:pointer;transition:all 0.15s;font-family:inherit;';
      btn.addEventListener('click', () => {
        if (selected.has(opt)) {
          selected.delete(opt);
          btn.style.background = '#2a2a3a';
          btn.style.borderColor = '#3a3a5a';
          btn.style.color = '#aaa';
        } else {
          selected.add(opt);
          btn.style.background = '#3a2e6a';
          btn.style.borderColor = '#7C6EE6';
          btn.style.color = '#c0b8ff';
        }
      });
      grid.appendChild(btn);
    });

    container.appendChild(grid);

    const confirmBtn = document.createElement('button');
    confirmBtn.textContent = 'Confirmer la sélection →';
    confirmBtn.style.cssText = 'background:#7C6EE6;border:none;border-radius:9px;padding:9px 18px;font-size:14px;color:#fff;cursor:pointer;font-family:inherit;transition:background 0.2s;';
    confirmBtn.addEventListener('mouseenter', () => confirmBtn.style.background = '#6558d4');
    confirmBtn.addEventListener('mouseleave', () => confirmBtn.style.background = '#7C6EE6');
    confirmBtn.addEventListener('click', () => {
      if (selected.size === 0) return;
      const chosen = Array.from(selected).join(', ');
      leadData.modules = chosen;
      container.style.opacity = '0.4';
      container.style.pointerEvents = 'none';
      // #region agent log (debug)
      try { console.debug('DBG568a1e modulePicker confirm click', { chosenLen: chosen.length, selectedCount: selected.size, step: STEPS[step], busy, inputDisabled: inputEl.disabled }); } catch {}
      // #endregion
      // Important: when the module picker is shown, the input is disabled, so `busy`
      // might never be reset by the usual end-of-handleSend() path. Ensure we can proceed.
      busy = false;
      // We are leaving SCOPE selection and moving to the RESUME step.
      step = STEPS.indexOf('resume');
      setProgress(STEPS[step]);
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.placeholder = 'Votre réponse...';
      handleSend(chosen);
    });

    container.appendChild(confirmBtn);
    return container;
  }

  function renderClientProblemButtons(onPick) {
    const container = document.createElement('div');
    container.style.cssText = 'display:flex;flex-direction:column;gap:8px;margin-top:12px;';

    const options = [
      "Je veux implémenter Odoo dans ma PME",
      "J'ai déjà Odoo mais j'ai besoin d'aide",
      "Autre"
    ];

    options.forEach(label => {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.style.cssText = 'background:#2a2a3a;border:1px solid #3a3a5a;border-radius:14px;padding:10px 14px;font-size:14px;color:#ececec;cursor:pointer;transition:all 0.15s;font-family:inherit;text-align:left;';
      btn.addEventListener('mouseenter', () => { btn.style.background = '#3a3a4a'; });
      btn.addEventListener('mouseleave', () => { btn.style.background = '#2a2a3a'; });
      btn.addEventListener('click', () => {
        container.style.opacity = '0.4';
        container.style.pointerEvents = 'none';
        addMsg(label, 'user');
        onPick(label);
      });
      container.appendChild(btn);
    });

    return container;
  }

  function addMsg(text, role, extra) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const av = document.createElement('div');
    av.className = 'msg-avatar ' + (role === 'bot' ? 'bot-av' : 'user-av');
    if (role === 'bot') {
      const img = document.createElement('img');
      img.src = BOT_AVATAR;
      img.alt = '';
      img.loading = 'lazy';
      av.appendChild(img);
    } else {
      av.textContent = 'U';
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'bot') {
      const clean = text
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/`(.*?)`/g, '$1')
        .replace('SHOW_MODULES', '')
        .replace('SHOW_WORKFLOW_BUTTONS', '')
        .replace('SHOW_CLIENT_PROBLEM', '')
        .replace('LEAD_CAPTURED', '')
        .trim();

      const lines = clean.split('\n').filter(l => l.trim());
      const workflowIdx = lines.findIndex(l =>
        (l.includes('→') || l.includes('->')) && l.split(/→|->/).length >= 2
      );

      if (workflowIdx !== -1) {
        // Has workflow — render text before, workflow, text after
        const before = lines.slice(0, workflowIdx).join('\n').trim();
        const after = lines.slice(workflowIdx + 1).join('\n').trim();
        if (before) renderTextBlock(before, bubble);
        const wf = renderWorkflow(lines[workflowIdx]);
        if (wf) bubble.appendChild(wf);
        if (after) renderTextBlock(after, bubble, '8px', '0');
      } else {
        renderTextBlock(clean, bubble);
      }

      if (extra) bubble.appendChild(extra);
    } else {
      bubble.textContent = text;
    }

    if (role === 'bot') { row.appendChild(av); row.appendChild(bubble); }
    else { row.appendChild(bubble); row.appendChild(av); }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function renderTextBlock(text, parent, marginTop, marginBottom) {
    const lines = text.split('\n').filter(l => l.trim());
    const bulletLines = lines.filter(l => /^[-•*]\s/.test(l.trim()));
    const isBulletList = bulletLines.length > 1;

    if (isBulletList) {
      // First line might be intro text (not a bullet)
      const introLine = lines.find(l => !/^[-•*]\s/.test(l.trim()));
      if (introLine) {
        const p = document.createElement('p');
        p.textContent = introLine;
        p.style.marginBottom = '8px';
        if (marginTop) p.style.marginTop = marginTop;
        parent.appendChild(p);
      }
      const ul = document.createElement('ul');
      ul.style.cssText = 'padding-left:18px;display:flex;flex-direction:column;gap:4px;margin:4px 0;';
      bulletLines.forEach(l => {
        const li = document.createElement('li');
        li.style.cssText = 'font-size:16px;line-height:1.65;color:#ececec;';
        li.textContent = l.replace(/^[-•*]\s/, '').trim();
        ul.appendChild(li);
      });
      parent.appendChild(ul);
    } else {
      const p = document.createElement('p');
      p.textContent = text;
      if (marginTop) p.style.marginTop = marginTop;
      if (marginBottom) p.style.marginBottom = marginBottom;
      parent.appendChild(p);
    }
  }

  function setTyping(on) {
    const existing = document.getElementById('typing');
    if (on && !existing) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing';
      const av = document.createElement('div');
      av.className = 'msg-avatar bot-av';
      const img = document.createElement('img');
      img.src = BOT_AVATAR;
      img.alt = '';
      img.loading = 'lazy';
      av.appendChild(img);
      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      row.appendChild(av);
      row.appendChild(dots);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } else if (!on && existing) {
      existing.remove();
    }
  }

  function systemPrompt() {
    return `Vous êtes Gigi, un assistant IA créé par Agitech, spécialiste de l'implémentation Odoo. Votre mission : préparer un résumé clair de votre entreprise et de vos processus pour optimiser le premier rendez-vous avec Sam, directeur chez Agitech.

L'introduction est gérée par l'interface. Vous démarrez à partir du moment où le site web est fourni.

Étape actuelle : ${STEPS[step]}

FLUX DE CONVERSATION :

- WEBSITE
  L'utilisateur vient de donner son URL. Faites une recherche web immédiatement.
  Commencez toujours par "D'après mes recherches, votre entreprise"
  Rédigez 2 à 3 puces concises (max 15 mots) : ce que fait votre entreprise, qui sont vos clients, comment vous vendez.
  Terminez par : "Est-ce que cela correspond bien à votre activité ?"
  Si l'URL est manquante, introuvable ou illisible : insistez gentiment et demandez-en une autre. Ne passez pas à l'étape suivante sans URL valide.

- CONFIRM_WEBSITE
  Si confirmé : répondez "Super !" et passez à WORKFLOW.
  Si non confirmé : demandez ce qui est inexact dans la description de votre entreprise, corrigez, puis demandez à nouveau si c'est correct.

- WORKFLOW
  Affichez le processus métier avec des libellés tirés de l'activité réelle de votre entreprise.
  Commencez par : "Je pense que le processus métier de votre entreprise ressemble à ceci :"
  Format sur sa propre ligne : Étape 1 → Étape 2 → Étape 3 → Étape 4 (jusqu'à 7 étapes si nécessaire)
  Le flux doit toujours couvrir : commande client, achat ou production, facturation ou paiement.
  Terminez par : "Est-ce que cela correspond à votre réalité ?"
  Terminez votre message par le token exact : SHOW_WORKFLOW_BUTTONS

- CONFIRM_WORKFLOW
  Si confirmé : répondez "Super !" et passez à CLIENT_PROBLEM.
  Si non confirmé : demandez ce qui ne correspond pas dans le processus de votre entreprise, corrigez, puis demandez à nouveau si c'est correct.

- CLIENT_PROBLEM
  Dites : "Pour mieux vous orienter, quelle est la raison principale de votre visite aujourd'hui ?"
  Terminez votre message par le token exact : SHOW_CLIENT_PROBLEM

- SCOPE
  Demandez quelles étapes de votre entreprise sont concernées, que voulez-vous prioriser ? Précisez qu'il suffit de cliquer dessus. Soyez bref.
  Terminez votre message par le token exact : SHOW_MODULES

- RESUME
  Faites un résumé exécutif en 3 puces :
  1) Site web (WEBSITE)
  2) Objectif / situation (CLIENT_PROBLEM)
  3) Priorités (SCOPE)
  Finissez le résumé par la question : "Je vais maintenant réaliser un Deep Search afin d'obtenir plus d'éléments sur votre entreprise et vous envoyer un rapport par email. Quel email faut-il utiliser pour vous envoyer le rapport ?"

- EMAIL
  Remerciez sincèrement en 2 phrases maximum.
  Indiquez qu'Agitech reprendra contact sous 24 heures avec une proposition personnalisée pour votre entreprise.
  Terminez par le token exact : LEAD_CAPTURED

- BOOKING (optionnel, seulement si l'utilisateur le demande explicitement)
  Proposez de réserver un rendez-vous avec Sam Gutman, dirigeant chez Agitech.
  Fournissez le lien : https://calendly.com/sam-agitech/45

Règles :
- Gigi vouvoie toujours l'utilisateur : "vous", "votre", "vos" — jamais "tu", "ton", "ta"
- Toujours parler de "votre entreprise", jamais "l'entreprise" ou "leur entreprise"
- Jamais de markdown gras, jamais d'astérisques
- Les puces uniquement à l'étape WEBSITE et RESUME
- Le workflow sur sa propre ligne avec des flèches →
- Maximum 4 puces ou phrases par réponse
- Une seule question à la fois, toujours`;
  }

  async function callAPI(userMessage) {
    history.push({ role: 'user', content: userMessage });
    const stepName = STEPS[step];
    const tools = stepName === 'website' ? [{ type: 'web_search_20250305', name: 'web_search' }] : [];

    // #region agent log (debug)
    try { console.debug('DBG568a1e callAPI start', { stepName, hasTools: tools.length > 0, toolsCount: tools.length, userMessageLen: (userMessage || '').length, historyLen: history.length }); } catch {}
    fetch('http://127.0.0.1:7265/ingest/efea978b-9701-42e8-b74f-e48b9c367085',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'568a1e'},body:JSON.stringify({sessionId:'568a1e',runId:'pre-fix',hypothesisId:'A',location:'index.html:callAPI:start',message:'callAPI start',data:{stepName,hasTools:tools.length>0,toolsCount:tools.length,userMessageLen:(userMessage||'').length,historyLen:history.length},timestamp:Date.now()})}).catch(()=>{});
    // #endregion

    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      system: systemPrompt(),
      messages: history
    };
    if (tools.length > 0) body.tools = tools;

    let res;
    let data;
    try {
      res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      data = await res.json();
    } catch (err) {
      // #region agent log (debug)
      try { console.debug('DBG568a1e callAPI fetch/json failed', { stepName, err: String(err && err.message ? err.message : err) }); } catch {}
      fetch('http://127.0.0.1:7265/ingest/efea978b-9701-42e8-b74f-e48b9c367085',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'568a1e'},body:JSON.stringify({sessionId:'568a1e',runId:'pre-fix',hypothesisId:'C',location:'index.html:callAPI:fetch',message:'callAPI fetch/json failed',data:{stepName,err:String(err && err.message ? err.message : err)},timestamp:Date.now()})}).catch(()=>{});
      // #endregion
      throw err;
    }

    const contentArr = Array.isArray(data?.content) ? data.content : [];
    const typeCounts = contentArr.reduce((acc, b) => { const t = b?.type || 'unknown'; acc[t] = (acc[t]||0)+1; return acc; }, {});
    const textBlocks = contentArr.filter(b => b.type === 'text');
    const reply = textBlocks.length > 0 ? textBlocks.map(b => b.text).join(' ').trim() : '';

    function prettyAnthropicError(d, status) {
      const err = d && d.error ? d.error : null;
      const type = err && err.type ? err.type : null;
      const message = err && err.message ? err.message : null;
      if (status === 429) return `Limite de requêtes atteinte (429). Merci de réessayer dans quelques instants.`;
      if (status === 401) return `Clé API invalide ou manquante (401).`;
      if (status === 403) return `Accès refusé (403).`;
      if (status >= 500) return `Erreur du serveur (HTTP ${status}). Merci de réessayer plus tard.`;
      if (type || message) return `Erreur API (HTTP ${status})${type ? ` · ${type}` : ''}${message ? ` · ${message}` : ''}`;
      return `Erreur API (HTTP ${status}).`;
    }

    // #region agent log (debug)
    try { console.debug('DBG568a1e callAPI response parsed', { stepName, httpStatus: res?.status, ok: res?.ok, contentIsArray: Array.isArray(data?.content), typeCounts, textBlocksCount: textBlocks.length, replyLen: reply.length }); } catch {}
    fetch('http://127.0.0.1:7265/ingest/efea978b-9701-42e8-b74f-e48b9c367085',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'568a1e'},body:JSON.stringify({sessionId:'568a1e',runId:'pre-fix',hypothesisId:'A',location:'index.html:callAPI:response',message:'callAPI response parsed',data:{stepName,httpStatus:res.status,ok:res.ok,contentIsArray:Array.isArray(data?.content),typeCounts,textBlocksCount:textBlocks.length,replyLen:reply.length,hasToolUse:!!typeCounts.tool_use},timestamp:Date.now()})}).catch(()=>{});
    // #endregion

    const finalReply = !res.ok
      ? prettyAnthropicError(data, res.status)
      : (reply || (typeCounts.tool_use && !typeCounts.text
          ? `Je rencontre un souci technique lors de la recherche web. Merci de réessayer dans quelques instants.`
          : 'Désolé, une erreur est survenue.'));

    // Important: store only plain text in history.
    // If we store raw content blocks (incl. tool blocks / non-text),
    // follow-up turns can break or lead to empty text replies.
    history.push({ role: 'assistant', content: finalReply });
    return finalReply;
  }

  async function handleSend(overrideText) {
    const text = overrideText || inputEl.value.trim();
    // #region agent log (debug)
    try { console.debug('DBG568a1e handleSend entry', { step: STEPS[step], busy, inputDisabled: inputEl.disabled, override: !!overrideText, textLen: text.length }); } catch {}
    // #endregion
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    if (!overrideText) inputEl.value = '';

    if (!overrideText) addMsg(text, 'user');

    if (STEPS[step] === 'website') leadData.website = text;
    if (STEPS[step] === 'email') leadData.email = text;

    setTyping(true);

    try {
      const requestStep = STEPS[step];
      const reply = await callAPI(text);
      setTyping(false);

      const isLeadCaptured = reply.includes('LEAD_CAPTURED');
      const asksScope = /Quelles étapes de votre entreprise sont concernées/i.test(reply);
      // Si Claude envoie déjà le contenu de l'étape SCOPE (token ou question),
      // on bascule l'étape avant de décider quel UI afficher.
      if (reply.includes('SHOW_MODULES') || asksScope) {
        step = STEPS.indexOf('scope');
        setProgress(STEPS[step]);
      }

      const stepName = STEPS[step];
      const wantsModules = reply.includes('SHOW_MODULES');
      const wantsWorkflowButtons = reply.includes('SHOW_WORKFLOW_BUTTONS');
      const asksWorkflowConfirm = /Est-ce que cela correspond à votre réalité\s*\?/i.test(reply);
      const asksClientProblem = /raison principale de votre visite/i.test(reply);

      // Affichage déterministe des boutons :
      // - WEBSITE : toujours afficher ✓/✎
      // - WORKFLOW : afficher ✓/✎ uniquement si la question de validation est posée
      // - CLIENT_PROBLEM : afficher les 3 choix uniquement si la question "raison principale..." est posée
      const showConfirmButtons =
        stepName === 'website' ||
        (stepName === 'workflow' && (asksWorkflowConfirm || wantsWorkflowButtons));
      const showClientProblemButtons =
        stepName === 'client_problem' && asksClientProblem && !leadData.clientProblemAsked;

      // SCOPE : afficher le sélecteur si token OU si la question SCOPE est détectée
      const showModules = stepName === 'scope' && (wantsModules || asksScope);

      let extra = null;

      if (showClientProblemButtons) {
        leadData.clientProblemAsked = true;
        extra = renderClientProblemButtons((choice) => {
          leadData.clientProblem = choice;
          // Re-enable input before sending follow-up,
          // otherwise handleSend() can leave the UI stuck in busy/disabled state.
          inputEl.disabled = false;
          sendBtn.disabled = false;
          inputEl.placeholder = 'Votre réponse...';

          // After the choice, Claude asks a follow-up question (still part of client_problem flow).
          step = STEPS.indexOf('client_problem');
          setProgress(STEPS[step]);
          busy = false;
          handleSend(choice);
        });
      } else if (showModules) {
        const wfSteps = leadData.workflow
          ? leadData.workflow.split(/→|->/).map(s => s.trim()).filter(Boolean)
          : ODOO_MODULES;
        extra = renderModulePicker(wfSteps);
        // #region agent log (debug)
        try { console.debug('DBG568a1e showModules renderModulePicker', { stepName, busy, inputDisabled: inputEl.disabled, wantsModules, asksScope }); } catch {}
        // #endregion
      } else if (showConfirmButtons) {
        // Disable input while user clicks Yes/No
        inputEl.disabled = true;
        sendBtn.disabled = true;
        inputEl.placeholder = 'Utilisez les boutons ci-dessus...';
        const confirmingStep = STEPS[step];
        extra = renderConfirmButtons(
          // YES — move forward
          () => {
            if (confirmingStep === 'website') {
              step = STEPS.indexOf('workflow');
            } else if (confirmingStep === 'workflow') {
              step = STEPS.indexOf('client_problem');
            } else {
              step = Math.min(step + 1, STEPS.length - 1);
            }
            setProgress(STEPS[step]);
            inputEl.disabled = false;
            inputEl.placeholder = 'Votre réponse...';
            sendBtn.disabled = false;
            busy = false;
            handleSend('Oui, c\'est correct');
          },
          // NO — let user type correction (input already re-enabled in renderConfirmButtons)
          () => {
            busy = false;
          }
        );
      }

      addMsg(reply, 'bot', extra);

      // Deterministic rule: after RESUME, always ask for email from the UI,
      // regardless of what Claude wrote.
      if (requestStep === 'resume') {
        const deepSearchEmailQuestion = "Je vais maintenant réaliser un Deep Search afin d'obtenir plus d'éléments sur votre entreprise et vous envoyer un rapport par email. Quel email faut-il utiliser pour vous envoyer le rapport ?";
        addMsg(deepSearchEmailQuestion, 'bot');
        step = STEPS.indexOf('email');
        setProgress(STEPS[step]);
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.placeholder = 'Votre réponse...';
      }

      // Save workflow line
      if (STEPS[step] === 'confirm_website' || STEPS[step] === 'workflow') {
        const wfLine = reply.split('\n').find(l =>
          (l.includes('→') || l.includes('->')) && l.split(/→|->/).length >= 2
        );
        if (wfLine) leadData.workflow = wfLine;
      }

      if (isLeadCaptured) {
        step = STEPS.indexOf('done');
        inputEl.disabled = true;
        inputEl.placeholder = '✓ Tout est bon !';
        console.log('Lead captured:', leadData);
      } else if (showModules) {
        // We keep the step as 'scope' while the picker is visible.
        inputEl.disabled = true;
        inputEl.placeholder = 'Utilisez le sélecteur ci-dessus...';
      } else if (showClientProblemButtons) {
        step = STEPS.indexOf('client_problem');
        inputEl.disabled = true;
        inputEl.placeholder = 'Choisissez une option ci-dessus...';
      } else if (!showConfirmButtons) {
        step = Math.min(step + 1, STEPS.length - 1);
        setProgress(STEPS[step]);
      }
      // #region agent log (debug)
      try { console.debug('DBG568a1e handleSend after-branch', { step: STEPS[step], busy, inputDisabled: inputEl.disabled, showModules, showConfirmButtons, showClientProblemButtons, isLeadCaptured }); } catch {}
      // #endregion

    } catch (e) {
      setTyping(false);
      addMsg('Oups, une erreur s’est produite. Veuillez réessayer.', 'bot');
    }

    if (!inputEl.disabled) {
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => handleSend());
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

  async function playIntro() {
    setProgress('intro');
    inputEl.disabled = true;
    sendBtn.disabled = true;
    busy = true;

    for (const line of INTRO_MESSAGES) {
      setTyping(true);
      await new Promise(resolve => setTimeout(resolve, 800));
      setTyping(false);
      addMsg(line, 'bot');
      await new Promise(resolve => setTimeout(resolve, 200));
    }

    step = STEPS.indexOf('website');
    setProgress('website');
    busy = false;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.placeholder = 'Votre réponse...';
    inputEl.focus();
  }

  // Kick off with local intro sequence
  playIntro();
</script>
