<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agitech Advisor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #ececec;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 52px;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-logo {
      width: 28px;
      height: 28px;
      background: #7C6EE6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar-logo svg { width: 16px; height: 16px; }
    .topbar-title {
      font-size: 15px;
      font-weight: 500;
      color: #ececec;
    }
    .topbar-badge {
      font-size: 11px;
      color: #888;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* Progress bar slim at very top */
    .progress-bar {
      height: 2px;
      background: #2a2a2a;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: #7C6EE6;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .msg-row {
      display: flex;
      padding: 0.6rem 1.5rem;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }
    .msg-avatar.bot-av {
      background: #7C6EE6;
      color: #fff;
    }
    .msg-avatar.user-av {
      background: #2e2e2e;
      color: #aaa;
      border: 1px solid #3a3a3a;
    }

    .msg-bubble {
      max-width: 72%;
      font-size: 15px;
      line-height: 1.65;
      color: #ececec;
      padding: 0;
    }
    .msg-row.user .msg-bubble {
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 16px;
      color: #ececec;
    }
    .msg-row.bot .msg-bubble {
      color: #ececec;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 8px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 1rem 1.5rem 1.5rem;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 0;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: #555; }
    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #ececec;
      font-family: inherit;
      line-height: 1.5;
      padding: 2px 0;
    }
    .input-box input::placeholder { color: #555; }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: #7C6EE6;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    .send-btn:hover { background: #6558d4; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
    </div>
    <span class="topbar-title">Agitech Advisor</span>
    <span class="topbar-badge">Lead qualification</span>
  </div>
</div>

<div class="chat-messages" id="messages"></div>

<div class="input-area">
  <div class="input-box">
    <input id="input" type="text" placeholder="Reply to Agitech Advisor..." autocomplete="off" />
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
  </div>
  <div class="input-hint">Powered by Claude · Your data is kept confidential</div>
</div>

<script>
  const STEPS = ['website', 'confirm', 'q1', 'q2', 'email', 'done'];
  const PROGRESS = { website: 10, confirm: 30, q1: 55, q2: 75, email: 90, done: 100 };
  let step = 0;
  let history = [];
  let leadData = {};
  let busy = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const progressEl = document.getElementById('progress');

  function renderWorkflow(text) {
    // Detect arrow-based workflow: A → B → C
    const arrowPattern = /(.+?)\s*[→\-\>]+\s*(.+)/;
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const steps = [];

    for (const line of lines) {
      if (line.includes('→') || line.includes('->')) {
        const parts = line.split(/→|->/).map(s => s.trim()).filter(Boolean);
        steps.push(...parts);
      }
    }

    if (steps.length < 2) return null;

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:10px;';

    steps.forEach((s, i) => {
      const box = document.createElement('div');
      box.style.cssText = 'background:#2a2a3a;border:1px solid #4a4a7a;border-radius:8px;padding:6px 12px;font-size:13px;color:#c0b8ff;white-space:nowrap;';
      box.textContent = s;
      wrapper.appendChild(box);

      if (i < steps.length - 1) {
        const arrow = document.createElement('span');
        arrow.style.cssText = 'color:#7C6EE6;font-size:16px;';
        arrow.textContent = '→';
        wrapper.appendChild(arrow);
      }
    });

    return wrapper;
  }

  function addMsg(text, role) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const av = document.createElement('div');
    av.className = 'msg-avatar ' + (role === 'bot' ? 'bot-av' : 'user-av');
    av.textContent = role === 'bot' ? 'A' : 'U';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'bot') {
      // Strip markdown bold/italic, render clean text
      const clean = text
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/`(.*?)`/g, '$1');

      // Split off any workflow line
      const workflowLineIndex = clean.split('\n').findIndex(l =>
        (l.includes('→') || l.includes('->')) && l.split(/→|->/).length >= 2
      );

      if (workflowLineIndex !== -1) {
        const lines = clean.split('\n');
        const beforeLines = lines.slice(0, workflowLineIndex).join('\n').trim();
        const workflowLine = lines[workflowLineIndex];
        const afterLines = lines.slice(workflowLineIndex + 1).join('\n').trim();

        if (beforeLines) {
          const p = document.createElement('p');
          p.textContent = beforeLines;
          p.style.marginBottom = '8px';
          bubble.appendChild(p);
        }

        const wf = renderWorkflow(workflowLine);
        if (wf) bubble.appendChild(wf);

        if (afterLines) {
          const p = document.createElement('p');
          p.textContent = afterLines;
          p.style.marginTop = '8px';
          bubble.appendChild(p);
        }
      } else {
        bubble.textContent = clean;
      }
    } else {
      bubble.textContent = text;
    }

    if (role === 'bot') {
      row.appendChild(av);
      row.appendChild(bubble);
    } else {
      row.appendChild(bubble);
      row.appendChild(av);
    }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function setTyping(on) {
    const existing = document.getElementById('typing');
    if (on && !existing) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing';
      const av = document.createElement('div');
      av.className = 'msg-avatar bot-av';
      av.textContent = 'A';
      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      row.appendChild(av);
      row.appendChild(dots);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } else if (!on && existing) {
      existing.remove();
    }
  }

  function setProgress(stepName) {
    progressEl.style.width = (PROGRESS[stepName] || 0) + '%';
  }

  function systemPrompt() {
    return `You are a warm, conversational lead qualification assistant for Agitech, an Odoo implementation company.

Current step: ${STEPS[step]}

Strict conversation flow:
- WEBSITE: The user just gave their website URL. You MUST use the web_search tool first to research it. After searching, write 2-3 sentences about what the company does (what they produce, who their clients are, how they sell). Then on a separate line, output their business process using ONLY this format: Step1 → Step2 → Step3 → Step4. Use real steps from their business. End with "Does that sound right?"
- CONFIRM: User confirmed or corrected. Say one warm acknowledging sentence, then ask: "What's your main reason for exploring Odoo right now?"
- Q1: Listen to their answer. Then ask: "Got it! And roughly how many people are on your team?"
- Q2: Listen. Then ask warmly: "Almost there — what email should we use to follow up with you?"
- EMAIL: Thank them genuinely. Say the team will reach out within 24 hours. Keep it to 2 sentences.

Rules:
- Never use markdown bold (**text**), asterisks, or bullet points — plain text only
- The workflow MUST be on its own line using → arrows, no other format
- Max 3 sentences of prose per reply
- Never ask two questions at once
- When in EMAIL step, end your reply with this exact token on its own line: LEAD_CAPTURED`;
  }

  async function callAPI(userMessage) {
    history.push({ role: 'user', content: userMessage });

    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt(),
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: history
    };

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    const textBlocks = data.content && data.content.filter(b => b.type === 'text');
    const textBlock = textBlocks && textBlocks[textBlocks.length - 1];
    const reply = textBlock ? textBlock.text : "Sorry, something went wrong.";
    history.push({ role: 'assistant', content: data.content });
    return reply;
  }

  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';

    addMsg(text, 'user');

    if (STEPS[step] === 'website') leadData.website = text;
    if (STEPS[step] === 'q1') leadData.q1 = text;
    if (STEPS[step] === 'q2') leadData.q2 = text;
    if (STEPS[step] === 'email') leadData.email = text;

    setTyping(true);

    try {
      const reply = await callAPI(text);
      setTyping(false);

      const isLeadCaptured = reply.includes('LEAD_CAPTURED');
      const cleanReply = reply.replace('LEAD_CAPTURED', '').trim();

      addMsg(cleanReply, 'bot');

      if (isLeadCaptured) {
        step = STEPS.indexOf('done');
        inputEl.disabled = true;
        inputEl.placeholder = '✓ All done!';
        console.log('Lead captured:', leadData);
        // TODO: send leadData to your Odoo CRM here
      } else {
        step = Math.min(step + 1, STEPS.length - 1);
      }

      setProgress(STEPS[step]);
    } catch (e) {
      setTyping(false);
      addMsg('Oops, something went wrong. Please try again.', 'bot');
    }

    busy = false;
    if (!inputEl.disabled) {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

  setProgress('website');
  addMsg("Hi! I'm here to help figure out if Odoo is a good fit for your business. To kick things off — what's your company website?", 'bot');
</script>
</body>
</html>
