<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agitech Advisor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #ececec;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 52px;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-logo {
      width: 28px;
      height: 28px;
      background: #7C6EE6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar-logo svg { width: 16px; height: 16px; }
    .topbar-title {
      font-size: 15px;
      font-weight: 500;
      color: #ececec;
    }
    .topbar-badge {
      font-size: 11px;
      color: #888;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* Progress bar slim at very top */
    .progress-bar {
      height: 2px;
      background: #2a2a2a;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: #7C6EE6;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .msg-row {
      display: flex;
      padding: 0.6rem 1.5rem;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }
    .msg-avatar.bot-av {
      background: #7C6EE6;
      color: #fff;
    }
    .msg-avatar.user-av {
      background: #2e2e2e;
      color: #aaa;
      border: 1px solid #3a3a3a;
    }

    .msg-bubble {
      max-width: 72%;
      font-size: 15px;
      line-height: 1.65;
      color: #ececec;
      padding: 0;
    }
    .msg-row.user .msg-bubble {
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 16px;
      color: #ececec;
    }
    .msg-row.bot .msg-bubble {
      color: #ececec;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 8px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 1rem 1.5rem 1.5rem;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 0;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: #555; }
    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #ececec;
      font-family: inherit;
      line-height: 1.5;
      padding: 2px 0;
    }
    .input-box input::placeholder { color: #555; }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: #7C6EE6;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    .send-btn:hover { background: #6558d4; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
    </div>
    <span class="topbar-title">Agitech Advisor</span>
    <span class="topbar-badge">Lead qualification</span>
  </div>
</div>

<div class="chat-messages" id="messages"></div>

<div class="input-area">
  <div class="input-box">
    <input id="input" type="text" placeholder="Reply to Agitech Advisor..." autocomplete="off" />
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
  </div>
  <div class="input-hint">Powered by Claude · Your data is kept confidential</div>
</div>

<script>
  const STEPS = ['intro', 'website', 'confirm', 'workflow', 'confirm_workflow', 'modules', 'email', 'done'];
  const PROGRESS = { intro: 5, website: 20, confirm: 40, workflow: 55, confirm_workflow: 70, modules: 85, email: 95, done: 100 };
  let step = 0;
  let history = [];
  let leadData = {};
  let busy = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const progressEl = document.getElementById('progress');

  const ODOO_MODULES = [
    'CRM & Sales', 'Purchase & Procurement', 'Inventory & Warehouse',
    'Manufacturing', 'Accounting & Invoicing', 'Project Management',
    'HR & Payroll', 'E-commerce', 'Point of Sale', 'Field Service'
  ];

  function setProgress(stepName) {
    progressEl.style.width = (PROGRESS[stepName] || 0) + '%';
  }

  function renderWorkflow(line) {
    const parts = line.split(/→|->/).map(s => s.trim()).filter(Boolean);
    if (parts.length < 2) return null;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:10px 0;';
    parts.forEach((s, i) => {
      const box = document.createElement('div');
      box.style.cssText = 'background:#2a2a3a;border:1px solid #4a4a7a;border-radius:8px;padding:6px 12px;font-size:13px;color:#c0b8ff;white-space:nowrap;';
      box.textContent = s;
      wrapper.appendChild(box);
      if (i < parts.length - 1) {
        const arrow = document.createElement('span');
        arrow.style.cssText = 'color:#7C6EE6;font-size:16px;flex-shrink:0;';
        arrow.textContent = '→';
        wrapper.appendChild(arrow);
      }
    });
    return wrapper;
  }

  function renderModulePicker(workflowSteps) {
    const container = document.createElement('div');
    container.style.cssText = 'margin-top:12px;';

    const label = document.createElement('p');
    label.style.cssText = 'font-size:13px;color:#888;margin-bottom:10px;';
    label.textContent = 'Select all that apply — then click Confirm';
    container.appendChild(label);

    const grid = document.createElement('div');
    grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;';

    const options = workflowSteps.length > 0 ? workflowSteps : ODOO_MODULES;
    const selected = new Set();

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.textContent = opt;
      btn.style.cssText = 'background:#2a2a3a;border:1px solid #3a3a5a;border-radius:20px;padding:7px 14px;font-size:13px;color:#aaa;cursor:pointer;transition:all 0.15s;font-family:inherit;';
      btn.addEventListener('click', () => {
        if (selected.has(opt)) {
          selected.delete(opt);
          btn.style.background = '#2a2a3a';
          btn.style.borderColor = '#3a3a5a';
          btn.style.color = '#aaa';
        } else {
          selected.add(opt);
          btn.style.background = '#3a2e6a';
          btn.style.borderColor = '#7C6EE6';
          btn.style.color = '#c0b8ff';
        }
      });
      grid.appendChild(btn);
    });

    container.appendChild(grid);

    const confirmBtn = document.createElement('button');
    confirmBtn.textContent = 'Confirm selection →';
    confirmBtn.style.cssText = 'background:#7C6EE6;border:none;border-radius:9px;padding:9px 18px;font-size:14px;color:#fff;cursor:pointer;font-family:inherit;transition:background 0.2s;';
    confirmBtn.addEventListener('mouseenter', () => confirmBtn.style.background = '#6558d4');
    confirmBtn.addEventListener('mouseleave', () => confirmBtn.style.background = '#7C6EE6');
    confirmBtn.addEventListener('click', () => {
      if (selected.size === 0) return;
      const chosen = Array.from(selected).join(', ');
      leadData.modules = chosen;
      container.style.opacity = '0.4';
      container.style.pointerEvents = 'none';
      handleSend(chosen);
    });

    container.appendChild(confirmBtn);
    return container;
  }

  function addMsg(text, role, extra) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const av = document.createElement('div');
    av.className = 'msg-avatar ' + (role === 'bot' ? 'bot-av' : 'user-av');
    av.textContent = role === 'bot' ? 'A' : 'U';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (role === 'bot') {
      const clean = text
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/`(.*?)`/g, '$1')
        .replace('SHOW_MODULES', '').trim();

      const lines = clean.split('\n');
      const workflowIdx = lines.findIndex(l =>
        (l.includes('→') || l.includes('->')) && l.split(/→|->/).length >= 2
      );

      if (workflowIdx !== -1) {
        const before = lines.slice(0, workflowIdx).join('\n').trim();
        const after = lines.slice(workflowIdx + 1).join('\n').trim();
        if (before) {
          const p = document.createElement('p');
          p.style.marginBottom = '4px';
          p.textContent = before;
          bubble.appendChild(p);
        }
        const wf = renderWorkflow(lines[workflowIdx]);
        if (wf) bubble.appendChild(wf);
        if (after) {
          const p = document.createElement('p');
          p.style.marginTop = '8px';
          p.textContent = after;
          bubble.appendChild(p);
        }
      } else {
        bubble.textContent = clean;
      }

      if (extra) bubble.appendChild(extra);
    } else {
      bubble.textContent = text;
    }

    if (role === 'bot') { row.appendChild(av); row.appendChild(bubble); }
    else { row.appendChild(bubble); row.appendChild(av); }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function setTyping(on) {
    const existing = document.getElementById('typing');
    if (on && !existing) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing';
      const av = document.createElement('div');
      av.className = 'msg-avatar bot-av';
      av.textContent = 'A';
      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      row.appendChild(av);
      row.appendChild(dots);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } else if (!on && existing) {
      existing.remove();
    }
  }

  function systemPrompt() {
    return `You are an AI assistant built on Claude, set up by Agitech, an Odoo implementation company. Your goal is to prepare a clear document summarizing what the client wants and how their business works — to save everyone's time before the first meeting.

Current step: ${STEPS[step]}

Strict conversation flow:

- INTRO: Introduce yourself warmly. Say you are an AI model based on Claude, set up by Agitech. Explain in one sentence that your goal is to prepare a document capturing their business process and needs to save everyone's time. Then ask: "To get started, what is your company website?"

- WEBSITE: The user just gave their website URL. You MUST use the web_search tool first to research it. After searching, write 4-5 sentences about what the company does — what they produce, who their clients are, how they sell. End with "Does that sound right?"

- CONFIRM: User confirmed or corrected the description. Now output their business process on a single line using ONLY this format: Step1 → Step2 → Step3 → Step4. The process MUST always include: (1) client ordering, (2) buying or producing, (3) invoicing or client paying. Use real labels from their business. End with "Does that sound right?"

- CONFIRM_WORKFLOW: User confirmed or corrected the workflow. Say one short warm sentence. Then say: "Which of these steps would you like to manage or improve with Odoo?" End your message with the exact token: SHOW_MODULES

- MODULES: User has selected modules from the list. Acknowledge their choices warmly in 1 sentence. Then ask: "What email should we use to send you the summary?"

- EMAIL: Thank them genuinely. Tell them Agitech will be in touch within 24 hours with a tailored proposal. Keep it to 2 sentences. End with: LEAD_CAPTURED

Rules:
- Never use markdown bold, asterisks, or bullet points — plain text only
- Workflow line must use → arrows on its own line
- Max 4 sentences of prose per reply
- Never ask two questions at once`;
  }

  async function callAPI(userMessage) {
    history.push({ role: 'user', content: userMessage });
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      system: systemPrompt(),
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: history
    };
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    const textBlocks = data.content && data.content.filter(b => b.type === 'text');
    const reply = textBlocks && textBlocks.length > 0
      ? textBlocks.map(b => b.text).join(' ').trim()
      : 'Sorry, something went wrong.';
    history.push({ role: 'assistant', content: data.content });
    return reply;
  }

  async function handleSend(overrideText) {
    const text = overrideText || inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    if (!overrideText) inputEl.value = '';

    if (!overrideText) addMsg(text, 'user');

    if (STEPS[step] === 'website') leadData.website = text;
    if (STEPS[step] === 'email') leadData.email = text;

    setTyping(true);

    try {
      const reply = await callAPI(text);
      setTyping(false);

      const isLeadCaptured = reply.includes('LEAD_CAPTURED');
      const showModules = reply.includes('SHOW_MODULES');

      let extra = null;
      if (showModules) {
        // Extract workflow steps from leadData to use as module options
        const wfSteps = leadData.workflow
          ? leadData.workflow.split(/→|->/).map(s => s.trim()).filter(Boolean)
          : ODOO_MODULES;
        extra = renderModulePicker(wfSteps);
      }

      addMsg(reply, 'bot', extra);

      // Save workflow from confirm step
      if (STEPS[step] === 'confirm') {
        const wfLine = reply.split('\n').find(l =>
          (l.includes('→') || l.includes('->')) && l.split(/→|->/).length >= 2
        );
        if (wfLine) leadData.workflow = wfLine;
      }

      if (isLeadCaptured) {
        step = STEPS.indexOf('done');
        inputEl.disabled = true;
        inputEl.placeholder = '✓ All done!';
        console.log('Lead captured:', leadData);
      } else if (showModules) {
        step = STEPS.indexOf('modules');
        inputEl.disabled = true;
        inputEl.placeholder = 'Use the selector above...';
      } else {
        step = Math.min(step + 1, STEPS.length - 1);
        if (inputEl.disabled && STEPS[step] !== 'modules') {
          inputEl.disabled = false;
          inputEl.placeholder = 'Reply to Agitech Advisor...';
        }
      }

      setProgress(STEPS[step]);
    } catch (e) {
      setTyping(false);
      addMsg('Oops, something went wrong. Please try again.', 'bot');
    }

    busy = false;
    if (!inputEl.disabled) {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => handleSend());
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

  // Kick off with intro — Claude introduces itself
  setProgress('intro');
  (async () => {
    setTyping(true);
    try {
      const reply = await callAPI('start');
      setTyping(false);
      addMsg(reply, 'bot');
      step = STEPS.indexOf('website');
      setProgress('website');
    } catch(e) {
      setTyping(false);
      addMsg("Hi! I'm the Agitech Advisor. What's your company website?", 'bot');
    }
    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  })();
</script>
</body>
</html>
