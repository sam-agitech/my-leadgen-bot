<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agitech Advisor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #ececec;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 52px;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-logo {
      width: 28px;
      height: 28px;
      background: #7C6EE6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar-logo svg { width: 16px; height: 16px; }
    .topbar-title {
      font-size: 15px;
      font-weight: 500;
      color: #ececec;
    }
    .topbar-badge {
      font-size: 11px;
      color: #888;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* Progress bar slim at very top */
    .progress-bar {
      height: 2px;
      background: #2a2a2a;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: #7C6EE6;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .msg-row {
      display: flex;
      padding: 0.6rem 1.5rem;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }
    .msg-avatar.bot-av {
      background: #7C6EE6;
      color: #fff;
    }
    .msg-avatar.user-av {
      background: #2e2e2e;
      color: #aaa;
      border: 1px solid #3a3a3a;
    }

    .msg-bubble {
      max-width: 72%;
      font-size: 15px;
      line-height: 1.65;
      color: #ececec;
      padding: 0;
    }
    .msg-row.user .msg-bubble {
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 16px;
      color: #ececec;
    }
    .msg-row.bot .msg-bubble {
      color: #ececec;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 8px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 1rem 1.5rem 1.5rem;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 0;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: #555; }
    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #ececec;
      font-family: inherit;
      line-height: 1.5;
      padding: 2px 0;
    }
    .input-box input::placeholder { color: #555; }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: #7C6EE6;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    .send-btn:hover { background: #6558d4; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
    </div>
    <span class="topbar-title">Agitech Advisor</span>
    <span class="topbar-badge">Lead qualification</span>
  </div>
</div>

<div class="chat-messages" id="messages"></div>

<div class="input-area">
  <div class="input-box">
    <input id="input" type="text" placeholder="Reply to Agitech Advisor..." autocomplete="off" />
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
  </div>
  <div class="input-hint">Powered by Claude · Your data is kept confidential</div>
</div>

<script>
  const STEPS = ['website', 'confirm', 'q1', 'q2', 'email', 'done'];
  const PROGRESS = { website: 10, confirm: 30, q1: 55, q2: 75, email: 90, done: 100 };
  let step = 0;
  let history = [];
  let leadData = {};
  let busy = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const progressEl = document.getElementById('progress');

  function addMsg(text, role) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const av = document.createElement('div');
    av.className = 'msg-avatar ' + (role === 'bot' ? 'bot-av' : 'user-av');
    av.textContent = role === 'bot' ? 'A' : 'U';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    if (role === 'bot') {
      row.appendChild(av);
      row.appendChild(bubble);
    } else {
      row.appendChild(bubble);
      row.appendChild(av);
    }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function setTyping(on) {
    const existing = document.getElementById('typing');
    if (on && !existing) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing';
      const av = document.createElement('div');
      av.className = 'msg-avatar bot-av';
      av.textContent = 'A';
      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      row.appendChild(av);
      row.appendChild(dots);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } else if (!on && existing) {
      existing.remove();
    }
  }

  function setProgress(stepName) {
    progressEl.style.width = (PROGRESS[stepName] || 0) + '%';
  }

  function systemPrompt() {
    return `You are a warm, conversational lead qualification assistant for an Odoo ERP implementation company. 

Current step: ${STEPS[step]}

Strict conversation flow:
- WEBSITE: User just gave their website URL. Use the web_search tool to look it up and write 2-3 sentences about what the company does. End with "Does that sound right?"
- CONFIRM: User confirmed or corrected. Acknowledge briefly, then ask: "What's your main reason for exploring Odoo right now?"
- Q1: Listen to their answer. Then ask: "Got it! And roughly how many people are on your team?"
- Q2: Listen. Then ask warmly: "Almost there — what email should we use to follow up with you?"
- EMAIL: Thank them genuinely. Say the team will reach out within 24 hours. Keep it to 2 sentences.

Rules:
- Be warm and human, never robotic
- Max 3 sentences per reply
- Never ask two questions at once
- When in EMAIL step, end your reply with this exact line: LEAD_CAPTURED`;
  }

  async function callAPI(userMessage) {
    history.push({ role: 'user', content: userMessage });

    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt(),
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: history
    };

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    const textBlock = data.content && data.content.find(b => b.type === 'text');
    const reply = textBlock ? textBlock.text : "Sorry, something went wrong.";
    history.push({ role: 'assistant', content: data.content });
    return reply;
  }

  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';

    addMsg(text, 'user');

    if (STEPS[step] === 'website') leadData.website = text;
    if (STEPS[step] === 'q1') leadData.q1 = text;
    if (STEPS[step] === 'q2') leadData.q2 = text;
    if (STEPS[step] === 'email') leadData.email = text;

    setTyping(true);

    try {
      const reply = await callAPI(text);
      setTyping(false);

      const isLeadCaptured = reply.includes('LEAD_CAPTURED');
      const cleanReply = reply.replace('LEAD_CAPTURED', '').trim();

      addMsg(cleanReply, 'bot');

      if (isLeadCaptured) {
        step = STEPS.indexOf('done');
        inputEl.disabled = true;
        inputEl.placeholder = '✓ All done!';
        console.log('Lead captured:', leadData);
        // TODO: send leadData to your Odoo CRM here
      } else {
        step = Math.min(step + 1, STEPS.length - 1);
      }

      setProgress(STEPS[step]);
    } catch (e) {
      setTyping(false);
      addMsg('Oops, something went wrong. Please try again.', 'bot');
    }

    busy = false;
    if (!inputEl.disabled) {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

  setProgress('website');
  addMsg("Hi! I'm here to help figure out if Odoo is a good fit for your business. To kick things off — what's your company website?", 'bot');
</script>
</body>
</html>
